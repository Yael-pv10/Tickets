spring:
  application:
    name: auditorio-tickets

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tickets}
    username: ${SPRING_DATASOURCE_USERNAME:tickets_user}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme_in_prod}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never
  forward-headers-strategy: framework

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:./keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:./keys/public.pem}
    access-expiration-min: ${JWT_ACCESS_EXPIRATION_MIN:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
    issuer: ${JWT_ISSUER:auditorio-tickets}
  qr:
    signing-secret: ${QR_SIGNING_SECRET:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  reservation:
    ttl-minutes: 10
  rate-limit:
    public-requests-per-minute: 100
    auth-requests-per-minute: 10
  bootstrap:
    admin-email: ${ADMIN_EMAIL:}
    admin-password: ${ADMIN_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.auditorio.tickets: DEBUG
    org.springframework.security: INFO
